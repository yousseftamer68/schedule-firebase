    appId:             "1:1052248778703:web:70607a578731fe983194ba"
  };

  firebase.initializeApp(cfg);
  var auth = firebase.auth();
  var rtdb = firebase.database();

  var currentUser = null;
  var overlay = document.getElementById('__fb_overlay');
  var root    = document.getElementById('root');
  var btn     = document.getElementById('__fb_btn');
  var errEl   = document.getElementById('__fb_err');
  var statusEl= document.getElementById('__fb_status');

  /* ── 2. Key helpers ──────────────────────────────────────── */
  var KEY_LOADED = '__fb_mazakrati_loaded';
  function fbKey(k)  { return k.replace(/[.#$\[\]]/g, '-'); }
  function userPath(uid) { return 'users/' + uid + '/mazakrati'; }

  /* ── 3. localStorage interception ───────────────────────── */
  var _set    = Storage.prototype.setItem;
  var _remove = Storage.prototype.removeItem;

  Storage.prototype.setItem = function (k, v) {
    _set.call(this, k, v);
    if (currentUser && this === window.localStorage && k !== KEY_LOADED) {
      try { rtdb.ref(userPath(currentUser.uid) + '/' + fbKey(k)).set(v); }
      catch (e) {}
    }
  };

  Storage.prototype.removeItem = function (k) {
    _remove.call(this, k);
    if (currentUser && this === window.localStorage && k !== KEY_LOADED) {
      try { rtdb.ref(userPath(currentUser.uid) + '/' + fbKey(k)).remove(); }
      catch (e) {}
    }
  };

  /* ── 4. Load Firebase → localStorage ────────────────────── */
  function loadFromFirebase(uid) {
    return rtdb.ref(userPath(uid)).get().then(function (snap) {
      if (snap.exists()) {
        var data = snap.val();
        Object.keys(data).forEach(function (k) {
          if (k !== fbKey(KEY_LOADED)) {
            _set.call(window.localStorage, k, data[k]);
          }
        });
      }
    });
  }

  /* ── 5. Show app ─────────────────────────────────────────── */
  function showApp() {
    overlay.classList.add('gone');
    root.style.display = '';
    setupNotifications();
  }

  /* ── 6. Google Sign-In ───────────────────────────────────── */
  btn.addEventListener('click', function () {
    btn.disabled = true;
    errEl.textContent = '';
    statusEl.textContent = 'جارٍ فتح نافذة تسجيل الدخول…';
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(function (e) {
      btn.disabled = false;
      statusEl.textContent = '';
      errEl.textContent = 'حدث خطأ: ' + (e.message || 'حاول مرة أخرى');
    });
  });

  /* ── 7. Auth state ───────────────────────────────────────── */
  auth.onAuthStateChanged(function (user) {
    if (!user) {
      currentUser = null;
      localStorage.removeItem(KEY_LOADED);
      overlay.classList.remove('gone');
      root.style.display = 'none';
      btn.disabled = false;
      statusEl.textContent = '';
      return;
    }

    currentUser = user;

    // If first load after login → load Firebase data then reload so
    // React app initialises with the correct localStorage values
    if (!localStorage.getItem(KEY_LOADED)) {
      statusEl.textContent = 'جارٍ تحميل بياناتك…';
      btn.disabled = true;
      loadFromFirebase(user.uid).then(function () {
        _set.call(window.localStorage, KEY_LOADED, '1');
        window.location.reload();
      }).catch(function () {
        _set.call(window.localStorage, KEY_LOADED, '1');
        window.location.reload();
      });
    } else {
      // Already loaded (post-reload or same session)
      showApp();
    }
  });

  /* ── 8. Notifications ────────────────────────────────────── */
  function setupNotifications() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
      Notification.requestPermission().then(function (p) {
        if (p === 'granted') registerSW();
      });
    } else if (Notification.permission === 'granted') {
      registerSW();
    }
  }

  function registerSW() {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('./sw.js').then(function (reg) {
      function msg() {
        if (reg.active) reg.active.postMessage({ type: 'SCHEDULE_REMINDERS' });
      }
      if (reg.active) msg();
      else reg.addEventListener('updatefound', function () {
        reg.installing && reg.installing.addEventListener('statechange', function () {
          if (reg.active) msg();
        });
      });
    }).catch(function (e) { console.warn('SW:', e); });
  }

})();
</script>
